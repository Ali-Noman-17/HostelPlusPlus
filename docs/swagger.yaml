openapi: 3.0.3
info:
  title: HostelPlusPlus API
  description: >
    REST API for finding, listing, and booking hostels. Supports multiple user
    roles: **student**, **professional**, **owner**, and **admin**.
    Authentication is handled via JWT Bearer tokens.
  version: 1.0.0
  contact:
    name: HostelPlusPlus

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

tags:
  - name: Auth
    description: Registration, login, and token verification
  - name: Hostels
    description: Public hostel listings
  - name: Search
    description: Search and availability checking
  - name: Cities
    description: City listings and their areas
  - name: Areas
    description: Area listings and hostels by area
  - name: Amenities
    description: Hostel amenity catalogue
  - name: Institutions
    description: Educational institutions and workplaces
  - name: Bookings
    description: Create and manage bookings (authenticated)
  - name: Reviews
    description: Create and manage hostel reviews
  - name: Users
    description: User profile and wishlist management (authenticated)
  - name: Owner
    description: Hostel and room management for owners (role: owner)
  - name: Admin
    description: Platform administration (role: admin)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /auth/login or POST /auth/register

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Error message

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        pages:
          type: integer
          example: 5

    User:
      type: object
      properties:
        user_id:
          type: integer
          example: 42
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john@example.com
        phone:
          type: string
          example: "+923001234567"
        user_type:
          type: string
          enum: [student, professional, owner, admin]
          example: student
        verified:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
        institution_id:
          type: integer
          nullable: true

    TokenData:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    City:
      type: object
      properties:
        city_id:
          type: integer
          example: 1
        city_name:
          type: string
          example: Lahore
        state:
          type: string
          example: Punjab
        country:
          type: string
          example: Pakistan
        hostel_count:
          type: integer
          example: 24

    Area:
      type: object
      properties:
        area_id:
          type: integer
          example: 5
        area_name:
          type: string
          example: Gulberg
        pincode:
          type: string
          example: "54000"
        city_id:
          type: integer
          example: 1
        city_name:
          type: string
          example: Lahore
        country:
          type: string
          example: Pakistan

    AmenitySummary:
      type: object
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: WiFi
        icon:
          type: string
          example: wifi

    Institution:
      type: object
      properties:
        institution_id:
          type: integer
          example: 1
        institution_name:
          type: string
          example: University of Punjab
        institution_type:
          type: string
          enum: [university, college, workplace, other]
          example: university
        address:
          type: string
          nullable: true
        city_id:
          type: integer
          example: 1
        city_name:
          type: string
          example: Lahore
        area_id:
          type: integer
          nullable: true
        area_name:
          type: string
          nullable: true
        latitude:
          type: number
          format: float
          nullable: true
        longitude:
          type: number
          format: float
          nullable: true
        created_at:
          type: string
          format: date-time

    HostelSummary:
      type: object
      properties:
        hostel_id:
          type: integer
          example: 10
        hostel_name:
          type: string
          example: Green Valley Hostel
        address:
          type: string
          example: 12 Garden Street
        area_name:
          type: string
          example: Gulberg
        city_name:
          type: string
          example: Lahore
        gender_preference:
          type: string
          enum: [male, female, co-ed]
          example: co-ed
        rating:
          type: number
          format: float
          example: 4.2
        total_reviews:
          type: integer
          example: 18
        is_verified:
          type: boolean
          example: true
        min_rent:
          type: number
          format: float
          example: 8000
        available_rooms:
          type: integer
          example: 3
        amenities:
          type: string
          description: Comma-separated top-5 amenities
          example: "WiFi, Laundry, Parking, Meals, Generator"

    Room:
      type: object
      properties:
        hostel_room_id:
          type: integer
          example: 101
        room_type:
          type: string
          example: Double Sharing
        room_number:
          type: string
          example: "A-201"
          nullable: true
        total_beds_in_room:
          type: integer
          example: 2
        available_beds:
          type: integer
          example: 1
        monthly_rent:
          type: number
          example: 12000
        security_deposit:
          type: number
          example: 5000
        is_available:
          type: boolean
          example: true
        floor_number:
          type: integer
          example: 2

    TransportInfo:
      type: object
      properties:
        transport_type:
          type: string
          example: metro
        route_name:
          type: string
          example: Orange Line
        route_number:
          type: string
          nullable: true
        stop_name:
          type: string
          example: Johar Town Station
        distance_to_stop_km:
          type: number
          example: 0.8
        frequency_minutes:
          type: integer
          nullable: true
          example: 10
        first_ride:
          type: string
          example: "06:00"
        last_ride:
          type: string
          example: "22:00"

    HostelDetail:
      allOf:
        - $ref: '#/components/schemas/HostelSummary'
        - type: object
          properties:
            owner_name:
              type: string
              example: Ali Hassan
            contact_number:
              type: string
              example: "+923009876543"
            alternate_number:
              type: string
              nullable: true
            email:
              type: string
              format: email
              nullable: true
            pincode:
              type: string
              nullable: true
            latitude:
              type: number
              format: float
              nullable: true
            longitude:
              type: number
              format: float
              nullable: true
            description:
              type: string
              nullable: true
            stats:
              type: object
              properties:
                total_rooms:
                  type: integer
                available_rooms:
                  type: integer
                total_beds:
                  type: integer
                available_beds:
                  type: integer
                price_range:
                  type: object
                  properties:
                    min:
                      type: number
                    max:
                      type: number
            rooms:
              type: array
              items:
                $ref: '#/components/schemas/Room'
            amenities:
              type: array
              items:
                type: object
                properties:
                  amenity_name:
                    type: string
                  category:
                    type: string
                  is_available:
                    type: boolean
                  additional_charges:
                    type: number
                    nullable: true
                  notes:
                    type: string
                    nullable: true
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/ReviewSummary'
            transport:
              $ref: '#/components/schemas/TransportInfo'
            nearby_places:
              type: array
              items:
                type: object
                properties:
                  place_name:
                    type: string
                  category_name:
                    type: string
                  distance_km:
                    type: number
                  estimated_time_minutes:
                    type: integer
                  walking_distance:
                    type: boolean
                  landmark:
                    type: boolean

    Booking:
      type: object
      properties:
        booking_id:
          type: integer
          example: 500
        booking_reference:
          type: string
          example: BKG12345678
        check_in_date:
          type: string
          format: date
          example: "2026-04-01"
        check_out_date:
          type: string
          format: date
          example: "2026-07-01"
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
          example: confirmed
        total_amount:
          type: number
          example: 36000
        advance_paid:
          type: number
          example: 7200
        payment_status:
          type: string
          enum: [pending, partial, completed]
          example: partial
        special_requests:
          type: string
          nullable: true
        hostel_id:
          type: integer
        hostel_name:
          type: string
        address:
          type: string
        hostel_contact:
          type: string
        area_name:
          type: string
        city_name:
          type: string
        room_type:
          type: string
        room_number:
          type: string
        user_id:
          type: integer
        guest_name:
          type: string
        guest_email:
          type: string
          format: email
        guest_phone:
          type: string
        booking_date:
          type: string
          format: date-time

    ReviewSummary:
      type: object
      properties:
        review_id:
          type: integer
        rating:
          type: number
          format: float
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        cleanliness_rating:
          type: number
          nullable: true
        food_rating:
          type: number
          nullable: true
        safety_rating:
          type: number
          nullable: true
        location_rating:
          type: number
          nullable: true
        review_date:
          type: string
          format: date
        user_name:
          type: string
          example: John D
        helpful_count:
          type: integer

    WishlistItem:
      type: object
      properties:
        wishlist_id:
          type: integer
        added_date:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
        hostel_id:
          type: integer
        hostel_name:
          type: string
        address:
          type: string
        area_name:
          type: string
        city_name:
          type: string
        rating:
          type: number
        gender_preference:
          type: string
        min_rent:
          type: number

    AuditLog:
      type: object
      properties:
        log_id:
          type: integer
        table_name:
          type: string
        record_id:
          type: integer
        action:
          type: string
          enum: [INSERT, UPDATE, DELETE]
        old_data:
          type: string
          nullable: true
        new_data:
          type: string
          nullable: true
        changed_by_name:
          type: string
          nullable: true
        changed_by_email:
          type: string
          nullable: true
        changed_at:
          type: string
          format: date-time

    DashboardStats:
      type: object
      properties:
        totals:
          type: object
          properties:
            users:
              type: integer
            hostels:
              type: integer
            bookings:
              type: integer
            reviews:
              type: integer
            revenue:
              type: number
        pending:
          type: object
          properties:
            hostels:
              type: integer
            users:
              type: integer
        recent_activity:
          type: array
          items:
            type: object

    OwnerDashboardStats:
      type: object
      properties:
        hostels:
          type: object
          properties:
            total:
              type: integer
        rooms:
          type: object
          properties:
            total:
              type: integer
            beds:
              type: object
              properties:
                total:
                  type: integer
                available:
                  type: integer
        bookings:
          type: object
          properties:
            total:
              type: integer
            confirmed:
              type: integer
            pending:
              type: integer
            completed:
              type: integer
        revenue:
          type: object
          properties:
            total:
              type: number
        recent_activity:
          type: array

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Resource identifier

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Items per page

  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: No token provided

    Forbidden:
      description: Authenticated but insufficient role/permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: Forbidden

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: Resource not found

    Conflict:
      description: Conflict with existing resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error: Internal server error

paths:
  # Health
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Auth]
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                  environment:
                    type: string
                  database:
                    type: string
                    example: connected

  # Auth
  /auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, email, phone, password]
              properties:
                first_name:
                  type: string
                  minLength: 2
                  maxLength: 50
                  example: John
                last_name:
                  type: string
                  maxLength: 50
                  example: Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                phone:
                  type: string
                  pattern: '^[0-9+\-\s]{10,20}$'
                  example: "+923001234567"
                password:
                  type: string
                  minLength: 6
                  format: password
                  example: secret123
                user_type:
                  type: string
                  enum: [student, professional, owner]
                  default: student
                institution_id:
                  type: integer
                  description: Required when user_type is student
                  example: 1
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: User registered successfully
                      data:
                        $ref: '#/components/schemas/TokenData'
        "400":
          $ref: '#/components/responses/ValidationError'
        "409":
          $ref: '#/components/responses/Conflict'
        "500":
          $ref: '#/components/responses/ServerError'

  /auth/login:
    post:
      summary: Login and receive a JWT token
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: Login successful
                      data:
                        $ref: '#/components/schemas/TokenData'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: Invalid email or password
        "500":
          $ref: '#/components/responses/ServerError'

  /auth/verify:
    get:
      summary: Verify JWT token and return current user
      operationId: verifyToken
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'

  # Hostels
  /hostels:
    get:
      summary: List all verified hostels
      operationId: getAllHostels
      tags: [Hostels]
      responses:
        "200":
          description: List of hostels
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      count:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HostelSummary'
        "500":
          $ref: '#/components/responses/ServerError'

  /hostels/{id}:
    get:
      summary: Get hostel details by ID
      operationId: getHostelById
      tags: [Hostels]
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: Hostel detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HostelDetail'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'

  # Search
  /search:
    get:
      summary: Search and filter verified hostels
      operationId: searchHostels
      tags: [Search]
      parameters:
        - name: city_id
          in: query
          schema:
            type: integer
          description: Filter by city
        - name: area_id
          in: query
          schema:
            type: integer
          description: Filter by area
        - name: min_price
          in: query
          schema:
            type: number
          description: Minimum monthly rent
        - name: max_price
          in: query
          schema:
            type: number
          description: Maximum monthly rent
        - name: gender
          in: query
          schema:
            type: string
            enum: [male, female]
          description: Gender preference filter (co-ed hostels always included)
        - name: nearby_categories
          in: query
          schema:
            type: string
          description: Comma-separated category IDs for nearby places filter
        - name: nearby_max_distance
          in: query
          schema:
            type: number
          description: Max distance in km for nearby places
        - name: transport_type
          in: query
          schema:
            type: string
            enum: [bus, metro, train, auto]
          description: Filter by public transport type
        - name: transport_max_distance
          in: query
          schema:
            type: number
          description: Max distance to transport stop in km
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [rating, price, reviews]
            default: rating
        - $ref: '#/components/parameters/PageParam'
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Filtered hostel results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HostelSummary'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        "500":
          $ref: '#/components/responses/ServerError'

  /search/categories:
    get:
      summary: Get all nearby categories for checklist filter
      operationId: getNearbyCategories
      tags: [Search]
      responses:
        "200":
          description: List of nearby categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            category_id:
                              type: integer
                            category_name:
                              type: string
                            icon:
                              type: string
        "500":
          $ref: '#/components/responses/ServerError'

  /search/transport-types:
    get:
      summary: Get all transport types for filter
      operationId: getTransportTypes
      tags: [Search]
      responses:
        "200":
          description: List of transport types
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: string
                        example: ["bus", "metro", "train", "auto"]
        "500":
          $ref: '#/components/responses/ServerError'

  /search/{id}/availability:
    get:
      summary: Check room availability for a hostel
      operationId: checkAvailability
      tags: [Search]
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: check_in
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-04-01"
        - name: check_out
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-07-01"
      responses:
        "200":
          description: Availability results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total_rooms:
                            type: integer
                          available_rooms:
                            type: integer
                          rooms:
                            type: array
                            items:
                              allOf:
                                - $ref: '#/components/schemas/Room'
                                - type: object
                                  properties:
                                    conflicting_bookings:
                                      type: integer
        "400":
          $ref: '#/components/responses/ValidationError'
        "500":
          $ref: '#/components/responses/ServerError'

  # Cities
  /cities:
    get:
      summary: List all cities with hostel counts
      operationId: getAllCities
      tags: [Cities]
      responses:
        "200":
          description: List of cities
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      count:
                        type: integer
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/City'
        "500":
          $ref: '#/components/responses/ServerError'

  /cities/{id}/areas:
    get:
      summary: Get areas in a city
      operationId: getCityAreas
      tags: [Cities]
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        "200":
          description: List of areas
          content:
